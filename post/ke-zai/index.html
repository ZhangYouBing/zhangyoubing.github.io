              <p>不惑不思，不获不失，不早不迟，不进不止，不寻不至，不冰不炽</p>
<p>我就要死了，对爱情来说，真是完美的结局，不是生离，而是死别。</p>
<p>我拔下身上的箭矢，我看见，你从肩胛中抽出温养的武器，你隔开了百鬼，你在身后划下发光的发饰，<br>
你被黑夜吞噬，你面容变换模糊，但我知道只是你，一直都是。</p>
<p>在寂静中醒来，黄昏或清晨都已停滞</p>
<p>刻在我心底的名字，刻在你背上的双翅。</p>
<p>没在一起，只是为了不在一起吧。</p>
